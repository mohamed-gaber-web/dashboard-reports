<div class="flex min-h-screen">
  <!-- Desktop sidebar -->
  <aside class="hidden shrink-0 lg:block">
    <div class="sticky top-0 h-screen">
      <app-sidebar />
    </div>
  </aside>

  <!-- Mobile drawer -->
  @if (model.drawerOpen()) {
    <div class="fixed inset-0 z-40 lg:hidden">
      <div class="absolute inset-0 bg-black/40" (click)="model.closeDrawer()"></div>
      <div class="absolute inset-y-0 left-0 shadow-xl">
        <app-sidebar (navigate)="model.closeDrawer()" />
      </div>
    </div>
  }

  <!-- Main column -->
  <div class="flex min-w-0 flex-1 flex-col">
    <app-topbar (menu)="model.openDrawer()" />
    <main class="mx-auto w-full max-w-7xl flex-1 px-4 py-6 sm:px-6 sm:py-8">
      <router-outlet />
    </main>
  </div>
</div>
