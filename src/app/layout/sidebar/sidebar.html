<nav
  class="flex h-full w-64 flex-col gap-1 px-3 py-5 text-white"
  style="
    background: linear-gradient(180deg, var(--color-brand-700), var(--color-brand-800));
    border-right: 1px solid rgba(255, 255, 255, 0.08);
  "
>
  <div class="mb-5 flex items-center gap-2.5 px-2">
    @if (branding.logo(); as logo) {
      <img [src]="logo" alt="Logo" class="h-9 w-9 rounded-xl object-cover shadow-[var(--shadow-sm)]" />
    } @else {
      <span
        class="grid h-9 w-9 place-items-center rounded-xl bg-white/15 text-white ring-1 ring-white/20"
      >
        <app-icon [path]="icons.dashboard" [size]="18" />
      </span>
    }
    <div class="flex min-w-0 flex-col leading-tight">
      <span class="truncate text-sm font-semibold text-white">{{ branding.appName() }}</span>
      <span class="text-xs text-white/55">Operations</span>
    </div>
  </div>

  <a routerLink="/dashboard" routerLinkActive="is-active" (click)="navigate.emit()" class="nav-link">
    <app-icon [path]="icons.dashboard" [size]="18" />
    <span>Overview</span>
  </a>

  <a routerLink="/ai/analyst" routerLinkActive="is-active" (click)="navigate.emit()" class="nav-link">
    <app-icon [path]="aiIcon" [size]="18" />
    <span class="flex-1">AI Analyst</span>
    <span class="rounded-full bg-white/15 px-1.5 py-0.5 text-[0.6rem] font-semibold uppercase tracking-wide">New</span>
  </a>

  <p class="mt-5 px-3 pb-1 text-[0.7rem] font-semibold uppercase tracking-wider text-white/45">Modules</p>

  @for (group of groups(); track group.id) {
    <button type="button" class="nav-link nav-group" (click)="toggle(group.id)">
      <app-icon [path]="group.icon" [size]="18" />
      <span class="flex-1 text-left">{{ group.title }}</span>
      <span class="chevron" [class.chevron-open]="isOpen(group.id)">
        <app-icon [path]="icons.chevron" [size]="16" />
      </span>
    </button>

    @if (isOpen(group.id)) {
      <div class="flex flex-col gap-0.5 pl-3.5">
        @for (child of group.children; track child.id) {
          <a
            [routerLink]="'/' + child.route"
            routerLinkActive="is-active"
            (click)="navigate.emit()"
            class="nav-link nav-child"
          >
            <app-icon [path]="child.icon" [size]="16" />
            <span>{{ child.title }}</span>
          </a>
        }
      </div>
    }
  }

  <a routerLink="/settings" routerLinkActive="is-active" (click)="navigate.emit()" class="nav-link mt-auto">
    <app-icon [path]="settingsIcon" [size]="18" />
    <span>Settings</span>
  </a>
</nav>
