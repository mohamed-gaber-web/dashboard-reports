@if (rows().length) {
  <ul class="flex flex-col gap-3.5">
    @for (row of rows(); track row.label) {
      <li class="flex flex-col gap-1.5">
        <div class="flex items-baseline justify-between gap-3 text-sm">
          <span class="truncate text-muted" [title]="row.label">{{ row.label }}</span>
          <span class="shrink-0 font-medium tabular-nums text-content">{{ row.display }}</span>
        </div>
        <div class="h-2.5 overflow-hidden rounded-full bg-surface-muted">
          <div
            class="h-full rounded-full transition-[width] duration-500 ease-out"
            [style.width.%]="row.widthPct"
            [style.background]="'linear-gradient(90deg, color-mix(in srgb, ' + row.color + ' 72%, #000), ' + row.color + ')'"
          ></div>
        </div>
      </li>
    }
  </ul>
} @else {
  <p class="py-8 text-center text-sm text-faint">No data to chart.</p>
}
