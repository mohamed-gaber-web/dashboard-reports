@if (rows().length) {
  <ul class="flex flex-col gap-3">
    @for (row of rows(); track row.label) {
      <li class="group flex flex-col gap-1.5" [title]="row.label + ' — ' + row.display">
        <div class="flex items-baseline justify-between gap-3 text-sm">
          <span class="truncate text-muted">{{ row.label }}</span>
          <span class="flex shrink-0 items-baseline gap-2">
            <span class="font-medium tabular-nums text-content">{{ row.display }}</span>
            @if (showShare()) {
              <span class="w-9 text-right text-xs tabular-nums text-faint">{{ row.share }}</span>
            }
          </span>
        </div>
        <!-- Track: the unfilled remainder, so every bar reads against the same span. -->
        <div class="h-2 rounded-full bg-surface-muted">
          <div
            class="h-full rounded-r-[4px] transition-[width] duration-500 ease-out group-hover:brightness-110"
            [style.width.%]="row.widthPct"
            [style.backgroundColor]="row.color"
          ></div>
        </div>
      </li>
    }
  </ul>
} @else {
  <p class="py-8 text-center text-sm text-faint">No data to chart.</p>
}
