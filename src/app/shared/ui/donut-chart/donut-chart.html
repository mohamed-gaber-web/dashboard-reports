@if (segments().length) {
  <div class="@container">
    <div class="flex flex-col items-center gap-6 @md:flex-row @md:items-center @md:gap-7">
      <div class="relative shrink-0" (mouseleave)="active.set(null)">
        <svg viewBox="0 0 36 36" class="h-36 w-36 @md:h-40 @md:w-40" role="img">
          <!-- Track: the unfilled remainder, one step off the surface. -->
          <circle
            cx="18"
            cy="18"
            r="15.915"
            fill="none"
            stroke="var(--color-surface-muted)"
            stroke-width="3.4"
          />
          @for (seg of segments(); track seg.label) {
            <circle
              cx="18"
              cy="18"
              r="15.915"
              fill="none"
              [attr.stroke]="seg.color"
              stroke-width="3.4"
              stroke-linecap="butt"
              [attr.stroke-dasharray]="seg.dashArray"
              [attr.stroke-dashoffset]="seg.dashOffset"
              [style.opacity]="opacity(seg.index)"
              class="donut-arc"
              (mouseenter)="active.set(seg.index)"
            >
              <title>{{ seg.label }} — {{ seg.valueLabel }} ({{ seg.percentLabel }})</title>
            </circle>
          }
        </svg>
        <div class="pointer-events-none absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-2xl font-semibold text-content" [title]="total().toLocaleString()">
            {{ totalDisplay() }}
          </span>
          <span class="text-xs text-faint">{{ centerLabel() }}</span>
        </div>
      </div>

      <ul class="flex w-full min-w-0 flex-col gap-1" (mouseleave)="active.set(null)">
        @for (seg of segments(); track seg.label) {
          <li
            class="flex items-center gap-2.5 rounded-lg px-2 py-1 text-sm transition-colors hover:bg-surface-muted/70"
            [style.opacity]="opacity(seg.index)"
            (mouseenter)="active.set(seg.index)"
          >
            <span
              class="h-2.5 w-2.5 shrink-0 rounded-full"
              [style.backgroundColor]="seg.color"
            ></span>
            <span class="truncate text-muted" [title]="seg.label">{{ seg.label }}</span>
            <span class="ml-auto shrink-0 font-medium tabular-nums text-content">
              {{ seg.valueLabel }}
            </span>
            <span class="w-11 shrink-0 text-right tabular-nums text-faint">
              {{ seg.percentLabel }}
            </span>
          </li>
        }
      </ul>
    </div>
  </div>
} @else {
  <p class="py-8 text-center text-sm text-faint">No data to chart.</p>
}
