<article
  class="group relative flex flex-col gap-4 overflow-hidden rounded-2xl p-5 text-white shadow-[var(--shadow-md)] transition-all duration-200 hover:-translate-y-1 hover:shadow-[var(--shadow-lg)]"
  [style.background]="gradient()"
>
  <!-- Decorative gloss -->
  <span class="pointer-events-none absolute -right-6 -top-12 h-28 w-28 rounded-full bg-white/15"></span>
  <span class="pointer-events-none absolute -right-14 top-4 h-24 w-24 rounded-full bg-white/10"></span>

  <div class="relative flex items-start justify-between gap-3">
    <span class="text-xs font-semibold uppercase tracking-wider text-white/80">{{ label() }}</span>
    @if (icon(); as iconPath) {
      <span class="grid h-10 w-10 place-items-center rounded-xl bg-white/20 ring-1 ring-white/25 backdrop-blur-sm">
        <app-icon [path]="iconPath" [size]="18" />
      </span>
    }
  </div>

  <div class="relative flex flex-col gap-1">
    <span class="text-[2.15rem] font-bold leading-none tracking-tight">{{ value() }}</span>
    @if (hint(); as h) {
      <span class="text-sm text-white/75">{{ h }}</span>
    }
  </div>
</article>
